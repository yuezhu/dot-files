# Use tmux-256color terminfo when available
if-shell 'infocmp tmux-256color' {
  set-option -g default-terminal 'tmux-256color'
} {
  set-option -g default-terminal 'screen-256color'
}

# Maximum number of lines held in window history
set-option -g history-limit 1000000

# Remap prefix to C-z
set-option -g prefix C-z
unbind-key C-b
bind-key C-z send-prefix

# C-z C-z to suspend currently attached client
# bind-key C-z suspend-client

# Keybinding styles
set-option -g status-keys "emacs"
set-option -g mode-keys "emacs"

# No waiting time for escape key
set-option -g escape-time 0

# Report terminal titles
set-option -g set-titles on

# Renumber windows in numerical order when a window is closed
set-option -g renumber-windows on

# Start numbering windows/panes from 1
set-option -g base-index 1
set-option -g pane-base-index 1

# Highlight windows with activity in the status line
set-option -g monitor-activity on

# Resize currently active window regardless of the size of other windows
# attached by other clients
set-option -g aggressive-resize on

# Redraw status bar every second (default 15s) so bell flags appear quickly
set-option -g status-interval 1

# Status line
set-option -g monitor-bell on
set-option -g visual-bell off
set-option -g window-status-format " #I:#W#F "
set-option -g window-status-current-format " #I:#W#F "
set-option -g window-status-separator ""
set-option -g status-left "  #S  "
set-option -g status-right "  #(TZ='America/New_York' date '+%%a %%b %%d %%l:%%M %%p')  "

# Draw thicker lines between panes
set-option -g pane-border-lines heavy

# Pane borders
set-option -g pane-active-border-style "fg=#345162"
set-option -g pane-border-style "fg=#333333"

# Status line
set-option -g status-style "bg=#222222,fg=#b2b4af"
set-option -g window-status-style "fg=#b2b4af"
set-option -g message-style "bg=#293121,fg=#eeeeec"
set-option -g message-command-style "bg=#293121,fg=#eeeeec"
set-option -g window-status-current-style "bg=#1a3647,fg=#eeeeec"
set-option -g window-status-activity-style "bg=#36273e,fg=#b2b4af"
set-option -g window-status-last-style "bg=#222222,fg=#b2b4af"
set-option -g window-status-bell-style "bg=#472020,fg=#b2b4af"
set-option -g status-left-style "bg=#142f24,fg=#eeeeec"
set-option -g status-right-style "bg=#142f24,fg=#eeeeec"

# Window rename format:
#   default shell (pane_title starts with hostname) -> folder:cmd       (e.g. project:zsh)
#   program-set title                               -> title:folder:cmd (e.g. user@remote:project:ssh)
set-option -g automatic-rename-format "#{?#{m:#{host_short}*,#{pane_title}},#{b:pane_current_path}:#{pane_current_command},#{pane_title}:#{b:pane_current_path}:#{pane_current_command}}"

# Display pane indicators for 5 seconds
set-option -g display-panes-time 5000

# Allow 1s (default 500ms) between repeated presses of -r bound keys
# (e.g. pane-resize) without needing the prefix again
set-option -g repeat-time 1000

# Create new panes in the same working directory
# https://github.com/tmux/tmux/wiki/recipes
bind-key '"' split-window -c "#{pane_current_path}"
bind-key % split-window -hc "#{pane_current_path}"
bind-key c new-window -c "#{pane_current_path}"

# If there are more than 2 panes, show numbers for selection;
# otherwise, cycle to next pane
bind-key o if-shell -F "#{e|>:#{window_panes},2}" {
  display-panes
} {
  select-pane -t :.+
}

# Enable mouse
set-option -g mouse on

# Disable tmux context menu
unbind-key -T root M-MouseDown3Pane
unbind-key -T root MouseDown3Pane
unbind-key -T root MouseDown3Status
unbind-key -T root MouseDown3StatusLeft

# Prefix + repeated Shift+Left/Right to re-order windows
bind-key -r S-Left swap-window -d -t -1
bind-key -r S-Right swap-window -d -t +1

# Use system clipboard
set-option -g set-clipboard on
set-option -g allow-passthrough on

# Copy/paste between system clipboard
# https://github.com/tmux/tmux/wiki/Clipboard
# https://wiki.archlinux.org/title/tmux#X_clipboard_integration

if-shell '[ $(uname -s) = Linux ]' {
  set-environment -g -h _TMUX_COPY  'xsel -i -p && xsel -o -p | xsel -i -b'
  set-environment -g -h _TMUX_PASTE 'xsel -o | tmux load-buffer - && tmux paste-buffer'
} {
  if-shell '[ $(uname -s) = Darwin ]' {
    set-environment -g -h _TMUX_COPY  'pbcopy'
    set-environment -g -h _TMUX_PASTE 'pbpaste | tmux load-buffer - && tmux paste-buffer'
  }
}

if-shell -F "#{&&:#{_TMUX_COPY},#{_TMUX_PASTE}}" {

  # root-mode
  bind-key -T root MouseDown3Pane {
    select-pane -t =
    if-shell -F "#{&&:#{pane_in_mode},#{==:#{pane_mode},copy-mode}}" {
      send-keys -X cancel
    }
    run-shell "#{_TMUX_PASTE}"
  }

  bind-key -T root DoubleClick1Pane {
    select-pane -t =
    if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" {
      send-keys -M
    } {
      copy-mode
      send-keys -X select-word
      send-keys -FX copy-pipe-no-clear "#{_TMUX_COPY}"
    }
  }

  bind-key -T root TripleClick1Pane {
    select-pane -t =
    if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" {
      send-keys -M
    } {
      copy-mode
      send-keys -X select-line
      send-keys -FX copy-pipe-no-clear "#{_TMUX_COPY}"
    }
  }

  bind-key ] {
    if-shell -F "#{&&:#{pane_in_mode},#{==:#{pane_mode},copy-mode}}" {
      send-keys -X cancel
    }
    run-shell "#{_TMUX_PASTE}"
  }

  # copy-mode
  bind-key -T copy-mode Enter {
    send-keys -FX copy-pipe-and-cancel "#{_TMUX_COPY}"
  }
  bind-key -T copy-mode C-j {
    send-keys -FX copy-pipe-and-cancel "#{_TMUX_COPY}"
  }
  bind-key -T copy-mode M-w {
    send-keys -FX copy-pipe-and-cancel "#{_TMUX_COPY}"
  }
  bind-key -T copy-mode MouseDragEnd1Pane {
    send-keys -FX copy-pipe-no-clear   "#{_TMUX_COPY}"
  }
  bind-key -T copy-mode MouseDown1Pane {
    select-pane
    send-keys -X clear-selection
  }
  bind-key -T copy-mode MouseDown3Pane {
    select-pane
    send-keys -X cancel
    run-shell "#{_TMUX_PASTE}"
  }

  bind-key -T copy-mode DoubleClick1Pane {
    select-pane
    send-keys -X select-word
    send-keys -FX copy-pipe-no-clear "#{_TMUX_COPY}"
  }

  bind-key -T copy-mode TripleClick1Pane {
    select-pane
    send-keys -X select-line
    send-keys -FX copy-pipe-no-clear "#{_TMUX_COPY}"
  }

}
