## Terminal
# Terminal type, color support, and feature negotiation.

# Use tmux-256color terminfo if available; fall back to screen-256color.
if-shell 'infocmp tmux-256color' {
  set-option -g default-terminal 'tmux-256color'
} {
  set-option -g default-terminal 'screen-256color'
}

# Enable true-color (RGB) for xterm-256color; let tmux detect other features.
set-option -sa terminal-features ",xterm-256color:RGB"

# Absorb duplicate Device Attributes replies via user-keys.
#
# Flow of the leak this setting prevents:
#
#   1. tmux probes outer terminal:           \e[c   (DA1)
#                                            \e[>c  (DA2)
#   2. Outer terminal replies, e.g. WT:      \e[?61;6;7;...c   (DA1)
#                                            \e[>0;10;1c       (DA2)
#   3. Some terminals (e.g. Windows Terminal via Win32-OpenSSH,
#      bug fixed in OpenSSH 9.5p1) send each reply twice. tmux's
#      built-in DA parser fires once per buffer; the duplicate is
#      left unprocessed in tmux's input buffer.
#   4. tmux's tty_keys peels the leftover bytes one-by-one and writes
#      each as a keypress to the active pane. Whatever app is there
#      (zsh, emacs, vim, ...) receives the bytes and may corrupt its
#      own state (literal text at prompt, unintended normal-mode
#      commands in vim, etc.).
#
# How user-keys breaks the chain (at step 4):
#
#   a. The exact reply bytes are registered as user-keys[0]/[1].
#   b. tmux's user-keys table is consulted before byte-peeling; an
#      exact match consumes the bytes from the buffer in one go.
#   c. Each match generates a User0/User1 event; with no tmux key
#      binding for it, the event is silently dropped — the bytes
#      never reach the pane.
#
# Limitations:
#   - user-keys match *exactly*. If SSH splits the duplicate across
#     reads (partial fragment like "\e[?61"), nothing matches and the
#     fragment leaks anyway.
#   - The exact strings are terminal-specific. For a new outer
#     terminal, capture them from a `tmux -vv` server log (grep
#     "received primary DA" and "received secondary DA") and add
#     more user-keys[N] entries.
set-option -s user-keys[0] "\e[?61;6;7;21;22;23;24;28;32;42c"
set-option -s user-keys[1] "\e[>0;10;1c"

# Disable the fast-keystroke "assume paste" heuristic.
#
# Flow of the leak this setting prevents:
#
#   1. tmux peels duplicate-reply bytes one-by-one (per the chain
#      above) when user-keys cannot match (e.g. split fragment).
#   2. The microsecond inter-byte interval trips the assume-paste-time
#      heuristic.
#   3. tmux flips the pane into paste mode and routes subsequent
#      bytes through window_pane_paste() instead of input_key(),
#      wrapping them in bracketed-paste markers
#      (\e[200~ ... \e[201~).
#   4. Bracketed paste bypasses pane apps' normal keymap matching;
#      the raw escape sequence is self-inserted as literal text.
#
# Setting this to 0 keeps tmux on the input_key() path even for
# fast bursts (step 3 never happens), so peeled bytes arrive as
# individual keypresses. Real pastes still work via bracketed paste
# mode (\e[?2004h), enabled by default.
set-option -g assume-paste-time 0

# Cancel the cursor-colour terminfo capabilities.
#
# Flow of the leak this override prevents:
#
#   1. tmux uses Cs (set cursor colour) / Cr (reset) to restore the
#      outer terminal's cursor colour on attach and detach.
#   2. The restore round-trip causes the outer terminal (e.g. Windows
#      Terminal) to send an OSC 12 reply: \e]12;rgb:RR/GG/BB\e\\.
#   3. On prefix+d the OSC 12 reply can still be in-flight when tmux
#      releases the TTY; the reply then lands on the outer ssh-side
#      zsh's stdin.
#   4. ZLE's keymap matcher eats the leading "\e]" framing and
#      self-inserts the SGR-looking tail (e.g. "35;92;66m") at the
#      prompt.
#
# "Cs@:Cr@" cancels both capabilities so tmux never emits the
# set/reset (step 1), so the outer terminal never replies (step 2).
# tmux 3.6a already auto-extends escape-time for OSC 10/11
# (#4541, #4569); OSC 12 is the remaining unguarded reply.
set-option -ag terminal-overrides ",*:Cs@:Cr@"

# Forward FocusIn/FocusOut events to pane applications.
#
# - When the outer terminal reports focus changes (focus event mode,
#   DECSET 1004 / \e[?1004h), tmux relays them to the focused pane as
#   FocusIn (\e[I) and FocusOut (\e[O) sequences.
# - Programs like Emacs and Vim use these to autosave or reload files
#   that changed on disk as focus leaves and returns.
set-option -g focus-events on

# Propagate the pane's terminal title to the outer terminal's window title.
set-option -g set-titles on

## Input
# Prefix key, key modes, and input timing.

# Use C-z as prefix. C-b conflicts with Emacs backward-char.
set-option -g prefix C-z
unbind-key  C-b

# Disable suspend-client (default binding for C-z in prefix table).
unbind-key C-z

# Use Emacs-style keys in the command prompt and in copy mode.
set-option -g status-keys "emacs"
set-option -g mode-keys   "emacs"

# Delay after a lone ESC before treating it as a standalone keypress.
#
# Flow tmux runs each time it reads an ESC byte:
#
#   1. ESC arrives in the input buffer.
#   2. tmux can't immediately tell if it's the Escape key or the first
#      byte of a longer sequence (arrow keys, Alt-combos, terminal
#      replies — all begin with ESC).
#   3. tmux waits this many milliseconds for more bytes.
#   4a. More bytes arrive in time → combine into a full sequence
#       (arrow key, Alt-x, etc.).
#   4b. Timer expires first → dispatch ESC as a standalone keypress.
#       Any later-arriving bytes are peeled as literal characters
#       (this is the "tail leaks as text" failure mode).
#
# Trade-off: too high adds lag to pressing Escape (4b takes longer);
# too low causes real sequences to split at step 3 and leak their
# tail (4b fires prematurely).
set-option -g escape-time 50

# Enable extended key reporting (the "modifyOtherKeys" feature).
#
# - Legacy terminal key encoding can't represent many modified keys
#   (e.g. C-Enter, C-/, S-Tab), collapsing them onto the same bytes as
#   their unmodified forms.
# - tmux always asks the outer terminal for extended keys when the
#   terminal supports them; this option instead governs the pane side.
#   When on, a program in the pane can opt in to modifyOtherKeys and
#   tmux then reports its modified keys as distinct escape sequences
#   rather than the ambiguous legacy bytes; when off, the pane only ever
#   sees standard keys. The exact sequence format is chosen separately
#   by extended-keys-format.
# - The extended-key sequences tmux reads from the outer terminal begin
#   with ESC, so they fall under the escape-time window above: if it is
#   set too low, tmux can split such a sequence and read its leading ESC
#   as a standalone Escape. A non-zero escape-time gives the whole
#   sequence time to arrive.
set-option -g extended-keys on

# Window allowed between repeated presses of a repeatable binding (milliseconds).
set-option -g repeat-time 1000

# Enable mouse: click to focus, scroll to enter copy mode, drag to resize.
set-option -g mouse on

## Windows & Panes
# Numbering, sizing, and scrollback.

# Start window and pane indices at 1 to match the keyboard number row.
set-option -g base-index      1
set-option -g pane-base-index 1

# Close numbering gaps after a window is closed.
set-option -g renumber-windows on

# Allow each client to resize the window to its own terminal dimensions.
set-option -g aggressive-resize on

# Scrollback lines per pane.
set-option -g history-limit 1000000

## Key Bindings
# Window and pane manipulation shortcuts.

# Open new panes and windows in the current pane's working directory.
bind-key '"' split-window    -c "#{pane_current_path}"
bind-key %   split-window -h -c "#{pane_current_path}"
bind-key c   new-window      -c "#{pane_current_path}"

# Move the current window left/right in the tab bar (-d keeps focus on it).
bind-key -r S-Left  swap-window -d -t -1
bind-key -r S-Right swap-window -d -t +1

# Duration the pane-number overlay stays visible (milliseconds).
set-option -g display-panes-time 5000

# Show pane-number overlay when there are more than 2 panes; otherwise cycle.
bind-key o if-shell -F "#{e|>:#{window_panes},2}" {
  display-panes
} {
  select-pane -t :.+
}

## Notifications
# Activity and bell monitoring for background windows.

# Highlight tabs when output appears in background windows.
set-option -g monitor-activity on

# Don't switch to or flash the screen on activity — tab highlight is enough.
set-option -g activity-action none

# Highlight tabs when a BEL (ASCII 0x07) is received from a pane.
set-option -g monitor-bell on

# Don't flash the screen on bell — the tab highlight is enough.
set-option -g visual-bell off

## Appearance

# Status bar refresh interval (seconds).
set-option -g status-interval 60

# Duration the status line messages and other on-screen indicators stay visible (milliseconds).
set-option -g display-time 5000

# Automatic window rename format.
#   Shell windows (pane title starts with hostname)  →  "cwd·command"
#   Remote/program-titled windows                    →  "title·cwd·command"
# This relies on zsh precmd / PROMPT setting pane_title to "hostname:…".
# If another program overwrites the title the match will fall through to the
# longer format, which is a safe degradation — not a loss of information.
set-option -g automatic-rename-format \
  "#{?#{m:#{host_short}*,#{pane_title}},\
#{b:pane_current_path}·#{pane_current_command},\
#{pane_title}·#{b:pane_current_path}·#{pane_current_command}}"

# Theme: colors, status bar surfaces, and status-left/right format strings.
#
## Atom One Dark
#
# Palette:
#   bg        #21252b   Panel/sidebar bg (a darker companion to Atom's
#                       editor bg #282c34). Used as the status bar
#                       surface and as dark text on pills.
#   fg        #abb2bf   Editor fg; primary status text. On-bar contrast
#                       (~7:1) matches the dark text on the green
#                       current-window pill.
#   accent    #98c379   Green; current-window pill + active pane border.
#   bell      #e5c07b   Yellow (hue-6-2); bell-flag tab text on the
#                       default bar bg (no pill).
#   divider   #5c6370   Comment fg; right-side field separator and
#                       inactive pane border.

# Pane borders: active pane matches the current-window pill style.
set-option -g pane-active-border-style "fg=#98c379"
set-option -g pane-border-style        "fg=#5c6370"

# Message bar (command-line input): replaces the entire status bar.
# Command-line input mode (message-command-style) inherits from this style.
set-option -g message-style "bg=#21252b,fg=#abb2bf"

# Status bar surfaces.
set-option -g status-style                 "bg=#21252b"
set-option -g window-status-current-style  "bg=#98c379"
set-option -g window-status-activity-style "none"
set-option -g window-status-bell-style     "bg=#21252b"

# Window tab format.
set-option -g window-status-format \
  " #{?window_bell_flag,#[fg=#e5c07b],#[fg=#abb2bf]}#I:#W#F "
set-option -g window-status-current-format \
  " #[fg=#21252b]#I:#W#F "
set-option -g window-status-separator ""

# Session indicator (left):
#   normal     →  "#S -"
#   prefix     →  "#S P"
#   copy mode  →  "#S C"
# All three states share the bar bg; mode is signaled by the trailing letter.
set-option -g status-left \
  "#[fg=#abb2bf] #S #{?pane_in_mode,C,#{?client_prefix,P,-}} "


# Extend left block width to fit the session indicator without truncation.
set-option -g status-left-length 60

# Right block: hostname and clock.
# clock is pinned to UTC regardless of the server's system timezone; %%Z prints
# the timezone abbreviation (UTC).
set-option -g status-right "#[fg=#abb2bf] #h  #(TZ='UTC' date '+%%H:%%M %%Z') "

set-option -g status-right-length 60

## Clipboard
# OSC 52 forwarding, copy/paste commands, and mouse/key bindings.
#
# Copy is pushed to the clipboard by two independent paths, both emitted by
# tmux-copy.sh:
#
#   OSC 52 → outer terminal (relies on set-clipboard on):
#     The script writes an OSC 52 sequence to the pane TTY. With set-clipboard
#     on, tmux captures the data into its own paste buffer and forwards the
#     sequence to the outer terminal (e.g. Windows Terminal), which then sets
#     its clipboard. This bridges copy across SSH with no extra tooling on the
#     outer-terminal side. (set-clipboard on likewise forwards OSC 52 emitted
#     by any other pane app, not just this script.)
#
#   xsel / pbcopy → local system clipboard:
#     The script also pipes the selection to xsel (Linux) or pbcopy (macOS),
#     setting the clipboard on the machine where tmux runs. This covers local
#     terminal emulators (e.g. xfce4-terminal) that do not support OSC 52.
#
#   The two paths are fully independent and can coexist in the same config.

# Forward OSC 52 from panes to the outer terminal and sync with the tmux
# paste buffer.
set-option -g set-clipboard on

# Let pane applications pass escape sequences straight through to the outer
# terminal.
#
# - tmux normally parses every escape sequence a pane emits, acting on the
#   ones it understands and dropping the rest, so a pane can't reach the
#   outer terminal directly.
# - With this on, an application can wrap a sequence in tmux's passthrough
#   form (the DCS sequence \ePtmux;<escaped sequence>\e\\) and tmux relays
#   the inner sequence verbatim, without interpreting it.
# - This is what lets sequences tmux has no handler for reach the outer
#   terminal — e.g. inline images (iTerm2 / Ghostty OSC 1337, kitty graphics).
# - It is not the clipboard path: OSC 52 copy is handled by tmux itself via
#   set-clipboard above, not through passthrough.
set-option -g allow-passthrough on

# Copy-side command run by every copy binding via copy-pipe.
#
# - copy-pipe feeds the selection to this command's stdin. The command
#   could be inlined, but every copy binding below references it, so it
#   lives in one variable to keep them in sync.
# - tmux-copy.sh does two things tmux alone can't: it also writes the
#   selection to the local system clipboard (xsel / pbcopy), covering
#   terminals with no OSC 52 support, and it truncates oversized payloads
#   so terminals that silently drop large OSC 52 sequences don't lose the
#   whole copy. The OSC 52 forwarding itself still rides on set-clipboard.
# - #{pane_tty} is expanded at use time to the pane's TTY device path; the
#   script writes the OSC 52 sequence there so tmux intercepts and forwards
#   it to the outer terminal.
# - Stored as a hidden (-h) env var so it isn't exported to child processes.
set-environment -g -h _TMUX_COPY_CMD '~/dot-files/tmux/tmux-copy.sh #{pane_tty}'

# Paste-side command run by the paste bindings via run-shell.
#
# - tmux's default paste pulls from its own paste buffer, not the system
#   clipboard. tmux-paste.sh instead reads the system clipboard (xsel /
#   pbpaste) into a buffer and pastes that, so a copy made outside tmux
#   pastes in.
# - It pastes with bracketed paste and a pinned named buffer: bracketed
#   paste stops apps like IPython from auto-indenting the pasted text, and
#   the named buffer keeps a concurrent push (e.g. OSC 52 from another
#   pane) from being pasted instead.
# - Stored as a hidden (-h) env var so it isn't exported to child processes.
set-environment -g -h _TMUX_PASTE_CMD '~/dot-files/tmux/tmux-paste.sh'

# Disable the default right-click context menus.
unbind-key -T root MouseDown3Pane            # pane
unbind-key -T root MouseDown3Status          # window tab
unbind-key -T root MouseDown3StatusLeft      # session name
unbind-key -T root M-MouseDown3Pane          # Alt + pane
unbind-key -T root M-MouseDown3Status        # Alt + window tab
unbind-key -T root M-MouseDown3StatusLeft    # Alt + session name

# Select-to-copy: when "on", drag / double-click / triple-click also copy.
# Toggle at runtime:  tmux set -g @select-to-copy on
set-option -g @select-to-copy on

# Right-click-to-paste: when "on", right-click pastes from system clipboard.
# Toggle at runtime:  tmux set -g @right-click-paste on
set-option -g @right-click-paste on

# Root mode bindings.

# Right-click → paste when @right-click-paste is on.
bind-key -T root MouseDown3Pane {
  if-shell -F "#{==:#{@right-click-paste},on}" {
    select-pane -t =
    if-shell -F "#{&&:#{pane_in_mode},#{==:#{pane_mode},copy-mode}}" {
      send-keys -X cancel
    }
    run-shell "#{_TMUX_PASTE_CMD}"
  }
}

# Double-click → select word; copy too when @select-to-copy is on.
bind-key -T root DoubleClick1Pane {
  select-pane -t =
  if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" {
    send-keys -M
  } {
    copy-mode
    send-keys -X select-word
    if-shell -F "#{==:#{@select-to-copy},on}" {
      send-keys -FX copy-pipe-no-clear "#{_TMUX_COPY_CMD}"
    }
  }
}

# Triple-click → select line; copy too when @select-to-copy is on.
bind-key -T root TripleClick1Pane {
  select-pane -t =
  if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" {
    send-keys -M
  } {
    copy-mode
    send-keys -X select-line
    if-shell -F "#{==:#{@select-to-copy},on}" {
      send-keys -FX copy-pipe-no-clear "#{_TMUX_COPY_CMD}"
    }
  }
}

# prefix+] → paste from system clipboard (overrides default tmux-buffer paste).
bind-key ] {
  if-shell -F "#{&&:#{pane_in_mode},#{==:#{pane_mode},copy-mode}}" {
    send-keys -X cancel
  }
  run-shell "#{_TMUX_PASTE_CMD}"
}

# Copy mode bindings.

# Mouse wheel in copy mode (tmux default is 5 lines per event).
# Ghostty (with mouse-scroll-multiplier=1) emits ~3 wheel events per physical
# click, so 1 line/event = ~3 lines/click. Other terminals (e.g. Windows
# Terminal → SSH) send 1 event per click, so 3 lines/event = 3 lines/click.
# TERM_PROGRAM is set by Ghostty (and by iTerm2, VS Code, etc.) to identify
# the outer terminal emulator.
if-shell '[ "$TERM_PROGRAM" = ghostty ]' {
  bind-key -T copy-mode WheelUpPane   send-keys -X -N 1 scroll-up
  bind-key -T copy-mode WheelDownPane send-keys -X -N 1 scroll-down
} {
  bind-key -T copy-mode WheelUpPane   send-keys -X -N 3 scroll-up
  bind-key -T copy-mode WheelDownPane send-keys -X -N 3 scroll-down
}

# Enter / C-j / M-w → copy and exit copy mode.
bind-key -T copy-mode Enter { send-keys -FX copy-pipe-and-cancel "#{_TMUX_COPY_CMD}" }
bind-key -T copy-mode C-j   { send-keys -FX copy-pipe-and-cancel "#{_TMUX_COPY_CMD}" }
bind-key -T copy-mode M-w   { send-keys -FX copy-pipe-and-cancel "#{_TMUX_COPY_CMD}" }

# Drag end → copy when @select-to-copy is on; otherwise just keep selection.
bind-key -T copy-mode MouseDragEnd1Pane {
  if-shell -F "#{==:#{@select-to-copy},on}" {
    send-keys -FX copy-pipe-no-clear "#{_TMUX_COPY_CMD}"
  }
}

# Single click → move cursor and clear selection. Does not exit copy mode.
bind-key -T copy-mode MouseDown1Pane {
  select-pane
  send-keys -X clear-selection
}

# Right-click in copy mode → cancel and paste when @right-click-paste is on.
bind-key -T copy-mode MouseDown3Pane {
  if-shell -F "#{==:#{@right-click-paste},on}" {
    select-pane
    send-keys -X cancel
    run-shell "#{_TMUX_PASTE_CMD}"
  }
}

# Double / triple click in copy mode: select; copy when @select-to-copy is on.
bind-key -T copy-mode DoubleClick1Pane {
  select-pane
  send-keys -X select-word
  if-shell -F "#{==:#{@select-to-copy},on}" {
    send-keys -FX copy-pipe-no-clear "#{_TMUX_COPY_CMD}"
  }
}

bind-key -T copy-mode TripleClick1Pane {
  select-pane
  send-keys -X select-line
  if-shell -F "#{==:#{@select-to-copy},on}" {
    send-keys -FX copy-pipe-no-clear "#{_TMUX_COPY_CMD}"
  }
}
