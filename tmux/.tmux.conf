# Use tmux-256color terminfo when available
if-shell 'infocmp tmux-256color' {
  set-option -g default-terminal 'tmux-256color'
} {
  set-option -g default-terminal 'screen-256color'
}

# Enable true color support
set-option -sa terminal-features ",*-256color:RGB"

# Maximum number of lines held in window history
set-option -g history-limit 1000000

# Remap prefix to C-z
set-option -g prefix C-z
unbind-key C-b
bind-key C-z send-prefix

# C-z C-z to suspend currently attached client
# bind-key C-z suspend-client

# Keybinding styles
set-option -g status-keys "emacs"
set-option -g mode-keys "emacs"

# No waiting time for escape key
set-option -g escape-time 5

# Forward extended key sequences (e.g. shift+enter) to pane applications
set-option -g extended-keys always

# Report terminal titles
set-option -g set-titles on

# Renumber windows in numerical order when a window is closed
set-option -g renumber-windows on

# Start numbering windows/panes from 1
set-option -g base-index 1
set-option -g pane-base-index 1

# Highlight windows with activity in status line
set-option -g monitor-activity on

# No action on window activity (e.g. bell), while still highlighting in status line
set-option -g activity-action none

# Resize currently active window regardless of the size of other windows
# attached by other clients
set-option -g aggressive-resize on

# Redraw status bar every second (default 15s) so bell flags appear quickly
set-option -g status-interval 1

# Status line
set-option -g monitor-bell on
set-option -g visual-bell off
set-option -g window-status-format " #I:#W#F "
set-option -g window-status-current-format " #I:#W#F "
set-option -g window-status-separator ""

# Draw thicker lines between panes
set-option -g pane-border-lines heavy

# Panes
set-option -g pane-active-border-style "fg=#346b83"
set-option -g pane-border-style "fg=#454545"

# Status line
set-option -g status-style "bg=#303030,fg=#b2b4af"
set-option -g window-status-style "fg=#b2b4af"
set-option -g message-style "bg=#523909,fg=#eeeeec"
set-option -g message-command-style "bg=#523909,fg=#eeeeec"
set-option -g window-status-current-style "bg=#005454,fg=#eeeeec"
set-option -g window-status-activity-style "bg=#2e3465,fg=#b2b4af"
set-option -g window-status-last-style "bg=#303030,fg=#b2b4af"
set-option -g window-status-bell-style "bg=#6d030f,fg=#b2b4af"

# Three-state session indicator
set-option -g status-left "#{?pane_in_mode,#[bg=#5a1e5e]  COPY  ,#{?client_prefix,#[bg=#005454]  #S  ,  #S  }}"
set-option -g status-left-style "bg=#4c3e34,fg=#eeeeec"
set-option -g status-right "#{?pane_in_mode,#[bg=#5a1e5e],#{?client_prefix,#[bg=#005454],#[bg=#4c3e34]}}  #h ∣ #(TZ='America/New_York' date '+%%a %%b %%d %%l:%%M %%p')  "
set-option -g status-right-style "fg=#eeeeec"

# Window rename format:
#   default shell (pane_title starts with hostname) -> folder:cmd       (e.g. project:zsh)
#   program-set title                               -> title:folder:cmd (e.g. user@remote:project:ssh)
set-option -g automatic-rename-format "#{?#{m:#{host_short}*,#{pane_title}},#{b:pane_current_path}:#{pane_current_command},#{pane_title}:#{b:pane_current_path}:#{pane_current_command}}"

# Display pane indicators for 5 seconds
set-option -g display-panes-time 5000

# Allow 1s (default 500ms) between repeated presses of -r bound keys
# (e.g. pane-resize) without needing the prefix again
set-option -g repeat-time 1000

# Create new panes in the same working directory
# https://github.com/tmux/tmux/wiki/recipes
bind-key '"' split-window -c "#{pane_current_path}"
bind-key % split-window -hc "#{pane_current_path}"
bind-key c new-window -c "#{pane_current_path}"

# If there are more than 2 panes, show numbers for selection;
# otherwise, cycle to next pane
bind-key o if-shell -F "#{e|>:#{window_panes},2}" {
  display-panes
} {
  select-pane -t :.+
}

# Enable mouse
set-option -g mouse on

# Disable tmux context menu
unbind-key -T root M-MouseDown3Pane
unbind-key -T root MouseDown3Pane
unbind-key -T root MouseDown3Status
unbind-key -T root MouseDown3StatusLeft

# Prefix + repeated Shift+Left/Right to re-order windows
bind-key -r S-Left swap-window -d -t -1
bind-key -r S-Right swap-window -d -t +1

# Copy/paste between system clipboard
# https://github.com/tmux/tmux/wiki/Clipboard
# https://wiki.archlinux.org/title/tmux#X_clipboard_integration
#
# How it works:
#   Copy side:  tmux copy-pipe feeds selected text to tmux-copy.sh, which
#               (a) sets the local clipboard via xsel/pbcopy, and
#               (b) emits an OSC 52 escape sequence to the pane TTY.
#               tmux intercepts the OSC 52 and forwards it to the attached
#               client terminal (e.g. Windows Terminal over SSH), which then
#               sets its own clipboard. This bridges the clipboard across SSH.
#
#   Paste side: reads from the local clipboard (xsel/pbpaste), loads it into
#               the tmux paste buffer, and pastes.
#
#   set-clipboard on: tells tmux to forward OSC 52 sequences from panes
#               to the outer terminal AND set tmux's own paste buffer.
#               This means Emacs's OSC 52 output populates the paste buffer,
#               and copy-pipe's OSC 52 also sets it (redundantly, since
#               copy-pipe already sets it directly - harmless for normal sizes).
#
#   allow-passthrough on: lets applications inside tmux send escape sequences
#               directly to the outer terminal (bypassing tmux's processing).
#               Used by tools like imgcat/sixel for inline images, and by some
#               terminal features that tmux doesn't natively understand.
#               Note: OSC 52 clipboard forwarding is handled by set-clipboard,
#               not allow-passthrough - they are independent mechanisms.

set-option -g set-clipboard on
set-option -g allow-passthrough on

# Copy command: the script handles platform detection internally and emits OSC 52.
# #{pane_tty} is expanded by tmux's -F flag to the pane's TTY path (e.g. /dev/pts/3).
set-environment -g -h _TMUX_COPY_CMD  '~/dot-files/tmux/tmux-copy.sh #{pane_tty}'

# Paste command: platform-specific, reads from local system clipboard
if-shell '[ $(uname -s) = Linux ]' {
  set-environment -g -h _TMUX_PASTE_CMD 'xsel -o | tmux load-buffer - && tmux paste-buffer'
} {
  if-shell '[ $(uname -s) = Darwin ]' {
    set-environment -g -h _TMUX_PASTE_CMD 'pbpaste | tmux load-buffer - && tmux paste-buffer'
  }
}

# Only bind clipboard keys if both copy and paste commands are set
# (-h makes the env vars "hidden", usable in format strings like #{_TMUX_COPY_CMD})
if-shell -F "#{&&:#{_TMUX_COPY_CMD},#{_TMUX_PASTE_CMD}}" {

  # root-mode
  bind-key -T root MouseDown3Pane {
    select-pane -t =
    if-shell -F "#{&&:#{pane_in_mode},#{==:#{pane_mode},copy-mode}}" {
      send-keys -X cancel
    }
    run-shell "#{_TMUX_PASTE_CMD}"
  }

  bind-key -T root DoubleClick1Pane {
    select-pane -t =
    if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" {
      send-keys -M
    } {
      copy-mode
      send-keys -X select-word
      send-keys -FX copy-pipe-no-clear "#{_TMUX_COPY_CMD}"
    }
  }

  bind-key -T root TripleClick1Pane {
    select-pane -t =
    if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" {
      send-keys -M
    } {
      copy-mode
      send-keys -X select-line
      send-keys -FX copy-pipe-no-clear "#{_TMUX_COPY_CMD}"
    }
  }

  bind-key ] {
    if-shell -F "#{&&:#{pane_in_mode},#{==:#{pane_mode},copy-mode}}" {
      send-keys -X cancel
    }
    run-shell "#{_TMUX_PASTE_CMD}"
  }

  # copy-mode
  bind-key -T copy-mode Enter {
    send-keys -FX copy-pipe-and-cancel "#{_TMUX_COPY_CMD}"
  }
  bind-key -T copy-mode C-j {
    send-keys -FX copy-pipe-and-cancel "#{_TMUX_COPY_CMD}"
  }
  bind-key -T copy-mode M-w {
    send-keys -FX copy-pipe-and-cancel "#{_TMUX_COPY_CMD}"
  }
  bind-key -T copy-mode MouseDragEnd1Pane {
    send-keys -FX copy-pipe-no-clear   "#{_TMUX_COPY_CMD}"
  }
  bind-key -T copy-mode MouseDown1Pane {
    select-pane
    send-keys -X clear-selection
  }
  bind-key -T copy-mode MouseDown3Pane {
    select-pane
    send-keys -X cancel
    run-shell "#{_TMUX_PASTE_CMD}"
  }

  bind-key -T copy-mode DoubleClick1Pane {
    select-pane
    send-keys -X select-word
    send-keys -FX copy-pipe-no-clear "#{_TMUX_COPY_CMD}"
  }

  bind-key -T copy-mode TripleClick1Pane {
    select-pane
    send-keys -X select-line
    send-keys -FX copy-pipe-no-clear "#{_TMUX_COPY_CMD}"
  }

}
