## Terminal
# Terminal type, color support, and feature negotiation.

# Use tmux-256color terminfo if available; fall back to screen-256color.
if-shell 'infocmp tmux-256color' {
  set-option -g default-terminal 'tmux-256color'
} {
  set-option -g default-terminal 'screen-256color'
}

# Declare terminal capabilities for xterm-256color.
# RGB alone supersedes the legacy terminal-overrides Tc flag.
set-option -sa terminal-features ",xterm-256color:RGB:extkeys:overline:strikethrough:usstyle:clipboard:ccolour:cstyle:focus:title"

# Forward FocusIn/FocusOut events to pane applications.
set-option -g focus-events on

# Propagate the pane's terminal title to the outer terminal's window title.
set-option -g set-titles on

## Input
# Prefix key, key modes, and input timing.

# Use C-z as prefix. C-b conflicts with Emacs backward-char.
set-option -g prefix C-z
unbind-key  C-b

# C-z C-z sends a literal C-z to the active pane (Emacs undo / shell suspend).
bind-key C-z send-prefix

# Use Emacs-style keys in the command prompt and in copy mode.
set-option -g status-keys "emacs"
set-option -g mode-keys   "emacs"

# Delay after ESC before treating it as a standalone keypress (milliseconds).
set-option -g escape-time 10

# Always enable extended key sequences.
# When terminal supports it, this allows tmux to not wait after ESC.
set-option -g extended-keys always

# Window allowed between repeated presses of a repeatable binding (milliseconds).
set-option -g repeat-time 1000

# Enable mouse: click to focus, scroll to enter copy mode, drag to resize.
set-option -g mouse on

## Windows & Panes
# Numbering, sizing, and scrollback.

# Start window and pane indices at 1 to match the keyboard number row.
set-option -g base-index      1
set-option -g pane-base-index 1

# Close numbering gaps after a window is closed.
set-option -g renumber-windows on

# Allow each client to resize the window to its own terminal dimensions.
set-option -g aggressive-resize on

# Scrollback buffer size per pane.
set-option -g history-limit 1000000

# Duration the pane-number overlay stays visible (milliseconds).
set-option -g display-panes-time 5000

# Duration the status line messages and other on-screen indicators stay visible (milliseconds).
set-option -g display-time 5000

## Key Bindings
# Window and pane manipulation shortcuts.

# Open new panes and windows in the current pane's working directory.
bind-key '"' split-window    -c "#{pane_current_path}"
bind-key %   split-window -h -c "#{pane_current_path}"
bind-key c   new-window      -c "#{pane_current_path}"

# Move the current window left/right in the tab bar (-d keeps focus on it).
bind-key -r S-Left  swap-window -d -t -1
bind-key -r S-Right swap-window -d -t +1

# Show pane-number overlay when there are more than 2 panes; otherwise cycle.
bind-key o if-shell -F "#{e|>:#{window_panes},2}" {
  display-panes
} {
  select-pane -t :.+
}

## Notifications
# Activity and bell monitoring for background windows.

# Highlight tabs when output appears in background windows.
set-option -g monitor-activity on

# Don't switch to or flash the screen on activity — tab highlight is enough.
set-option -g activity-action none

# Highlight tabs when a BEL (ASCII 0x07) is received from a pane.
set-option -g monitor-bell on

# Don't flash the screen on bell — the tab highlight is enough.
set-option -g visual-bell off

## Appearance
# Pane borders, status bar colors, and status bar format.

set-option -g pane-active-border-style "fg=#226783"
set-option -g pane-border-style        "fg=#41474c"

# Message bar (command-line input): replaces the entire status bar.
# Command-line input mode (message-command-style) inherits from this style.
set-option -g message-style "bg=#41474c,fg=#eeeeec"

# Status bar refresh interval (seconds).
set-option -g status-interval 60

# Status bar and window tab backgrounds. All fg is set per-element in the
# format strings. Inactive and last-window tabs inherit bg from status-style;
# the last-window "-" flag is the only distinguishing mark.
set-option -g status-style                 "bg=#303030"
set-option -g window-status-current-style  "bg=#005454"
set-option -g window-status-activity-style "bg=#23334c"
set-option -g window-status-bell-style     "bg=#651719"

# Window tab formats. #I, #W, and #F each set their own fg:
#   #W     — full text contrast for its bg
#   #I:#F  — tinted accents that harmonize with each tab's bg
set-option -g window-status-format \
  " #{?window_bell_flag,#[fg=#dc8782],#{?window_activity_flag,#[fg=#8b9db9],#[fg=#999999]}}#I\
#{?window_bell_flag,#[fg=#915350],#{?window_activity_flag,#[fg=#566377],#[fg=#606060]}}:\
#{?window_bell_flag,#[fg=#f2bcb9],#{?window_activity_flag,#[fg=#bbc8d9],#[fg=#c3c3c3]}}#W\
#{?window_bell_flag,#[fg=#dc8782],#{?window_activity_flag,#[fg=#8b9db9],#[fg=#999999]}}#F "
set-option -g window-status-current-format \
  " #[fg=#88c8c7]#I#[fg=#568484]:#[fg=#cff5f5]#W#[fg=#88c8c7]#F "
set-option -g window-status-separator ""

# Session indicator (left block):
#   copy mode  →  magenta #5a1e5e, "◆ #S"
#   prefix     →  cool-gray #41474c, "◇ #S" (symbol is the signal)
#   normal     →  cool-gray #41474c, session name
set-option -g status-left \
  "#{?pane_in_mode,#[bg=#5a1e5e fg=#eeeeec]  ◆ #S  ,#[bg=#41474c fg=#eeeeec]#{?client_prefix,  ◇ #S  ,  #S  }}"

# Right block: pane count, hostname, and clock. Same two-state bg as left.
# ▪ + pane count is shown only when the current window has more than one pane.
# ∣ (U+2223) is used as a visual divider, tinted to recede.
# date is pinned to America/New_York regardless of the server's system timezone.
set-option -g status-right \
  "#{?pane_in_mode,#[bg=#5a1e5e fg=#eeeeec],#[bg=#41474c fg=#eeeeec]}\
  #{?#{e|>:#{window_panes},1},▪ #{window_panes} #[fg=#999999]∣#[fg=#eeeeec] ,}\
#h #[fg=#999999]∣#[fg=#eeeeec] \
#(TZ='America/New_York' date '+%%a %%b %%d %%l:%%M %%p')  "

# Extend right block width to fit the pane count indicator without truncation.
set-option -g status-right-length 60

# Automatic window rename format.
#   Shell windows (pane title starts with hostname)  →  "cwd·command"
#   Remote/program-titled windows                    →  "title·cwd·command"
# This relies on zsh precmd / PROMPT setting pane_title to "hostname:…".
# If another program overwrites the title the match will fall through to the
# longer format, which is a safe degradation — not a loss of information.
set-option -g automatic-rename-format \
  "#{?#{m:#{host_short}*,#{pane_title}},\
#{b:pane_current_path}·#{pane_current_command},\
#{pane_title}·#{b:pane_current_path}·#{pane_current_command}}"

## Clipboard
# OSC 52 forwarding, copy/paste commands, and mouse/key bindings.
#
# Two mechanisms cooperate:
#
#   OSC 52 (set-clipboard on):
#     When a pane emits an OSC 52 sequence, tmux stores the data in its paste
#     buffer and forwards the sequence to the outer terminal (e.g. Windows
#     Terminal), which then sets the Windows clipboard. This bridges copy
#     operations across SSH without any additional tooling on the Windows side.
#
#   xsel / pbcopy (tmux-copy.sh):
#     The copy script also writes to the local X11 clipboard via xsel (Linux)
#     or pbcopy (macOS). This covers local terminal emulators (e.g. xfce4-
#     terminal) that do not support OSC 52.
#
#   The two paths are fully independent and can coexist in the same config.

# Forward OSC 52 from panes to the outer terminal and sync with the tmux
# paste buffer.
set-option -g set-clipboard on

# Allow pane applications to send arbitrary escape sequences (e.g. inline
# images via OSC 1337) directly to the outer terminal.
set-option -g allow-passthrough on

# Copy-side command (hidden env var, not exported to child processes).
# #{pane_tty} is expanded at use time to the pane's TTY device path.
set-environment -g -h _TMUX_COPY_CMD '~/dot-files/tmux/tmux-copy.sh #{pane_tty}'

# Paste-side command: read system clipboard into a named buffer and paste it.
# A named buffer (-b _clip) avoids a race where a concurrent copy-pipe could
# overwrite the default buffer between load-buffer and paste-buffer.
# -d deletes the named buffer after pasting to avoid stale data.
if-shell '[ $(uname -s) = Linux ]' {
  set-environment -g -h _TMUX_PASTE_CMD \
    'if [ -n "$DISPLAY" ]; then xsel -o | tmux load-buffer -b _clip - && tmux paste-buffer -b _clip -d; else tmux paste-buffer; fi'
} {
  if-shell '[ $(uname -s) = Darwin ]' {
    set-environment -g -h _TMUX_PASTE_CMD \
      'pbpaste | tmux load-buffer -b _clip - && tmux paste-buffer -b _clip -d'
  }
}

# Disable the default right-click context menus.
unbind-key -T root MouseDown3Pane            # pane
unbind-key -T root MouseDown3Status          # window tab
unbind-key -T root MouseDown3StatusLeft      # session name
unbind-key -T root M-MouseDown3Pane          # Alt + pane
unbind-key -T root M-MouseDown3Status        # Alt + window tab
unbind-key -T root M-MouseDown3StatusLeft    # Alt + session name

# Bind clipboard keys only when both commands resolved successfully.
if-shell -F "#{&&:#{_TMUX_COPY_CMD},#{_TMUX_PASTE_CMD}}" {

  # Root mode bindings.

  # Right-click → paste (exits copy mode first if active).
  bind-key -T root MouseDown3Pane {
    select-pane -t =
    if-shell -F "#{&&:#{pane_in_mode},#{==:#{pane_mode},copy-mode}}" {
      send-keys -X cancel
    }
    run-shell "#{_TMUX_PASTE_CMD}"
  }

  # Double-click → select word and copy (keeps selection visible).
  bind-key -T root DoubleClick1Pane {
    select-pane -t =
    if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" {
      send-keys -M
    } {
      copy-mode
      send-keys -X select-word
      send-keys -FX copy-pipe-no-clear "#{_TMUX_COPY_CMD}"
    }
  }

  # Triple-click → select line and copy.
  bind-key -T root TripleClick1Pane {
    select-pane -t =
    if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" {
      send-keys -M
    } {
      copy-mode
      send-keys -X select-line
      send-keys -FX copy-pipe-no-clear "#{_TMUX_COPY_CMD}"
    }
  }

  # prefix+] → paste from system clipboard (overrides default tmux-buffer paste).
  bind-key ] {
    if-shell -F "#{&&:#{pane_in_mode},#{==:#{pane_mode},copy-mode}}" {
      send-keys -X cancel
    }
    run-shell "#{_TMUX_PASTE_CMD}"
  }

  # Copy mode bindings.

  # Enter / C-j / M-w → copy and exit copy mode.
  bind-key -T copy-mode Enter { send-keys -FX copy-pipe-and-cancel "#{_TMUX_COPY_CMD}" }
  bind-key -T copy-mode C-j   { send-keys -FX copy-pipe-and-cancel "#{_TMUX_COPY_CMD}" }
  bind-key -T copy-mode M-w   { send-keys -FX copy-pipe-and-cancel "#{_TMUX_COPY_CMD}" }

  # Drag end → copy and keep copy mode active (selection stays highlighted).
  bind-key -T copy-mode MouseDragEnd1Pane {
    send-keys -FX copy-pipe-no-clear "#{_TMUX_COPY_CMD}"
  }

  # Single click → move cursor and clear selection. Does not exit copy mode.
  bind-key -T copy-mode MouseDown1Pane {
    select-pane
    send-keys -X clear-selection
  }

  # Right-click in copy mode → cancel and paste.
  bind-key -T copy-mode MouseDown3Pane {
    select-pane
    send-keys -X cancel
    run-shell "#{_TMUX_PASTE_CMD}"
  }

  # Double / triple click in copy mode: same as root mode.
  bind-key -T copy-mode DoubleClick1Pane {
    select-pane
    send-keys -X select-word
    send-keys -FX copy-pipe-no-clear "#{_TMUX_COPY_CMD}"
  }

  bind-key -T copy-mode TripleClick1Pane {
    select-pane
    send-keys -X select-line
    send-keys -FX copy-pipe-no-clear "#{_TMUX_COPY_CMD}"
  }
}
